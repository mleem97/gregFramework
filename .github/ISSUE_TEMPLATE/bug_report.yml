name: Bug Report
description: Report a bug in framework or standalone mods.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the problem?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Framework Version
      placeholder: 00.01.0008
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Provide exact steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant `MelonLoader/Latest.log` and `FrikaFM` logs.
