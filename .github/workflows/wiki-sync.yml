name: Wiki Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "master" ]
    paths:
      - ".wiki/**"
      - "scripts/Sync-Wiki.ps1"
  workflow_dispatch:
    inputs:
      useHostedRunner:
        description: "Use hosted Windows runner (manual fallback)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync-wiki-self-hosted:
    runs-on:
      - self-hosted
      - windows
      - x64
      - Marvins-Ding
    timeout-minutes: 15
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'workflow_dispatch' || github.event.inputs.useHostedRunner != 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync .wiki to GitHub wiki repo
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File .\scripts\Sync-Wiki.ps1 `
            -GitHubToken "${{ secrets.GITHUB_TOKEN }}" `
            -GitHubActor "${{ github.actor }}"

  sync-wiki-hosted-fallback:
    runs-on: windows-latest
    timeout-minutes: 15
    if: github.actor != 'github-actions[bot]' && github.event_name == 'workflow_dispatch' && github.event.inputs.useHostedRunner == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync .wiki to GitHub wiki repo
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File .\scripts\Sync-Wiki.ps1 `
            -GitHubToken "${{ secrets.GITHUB_TOKEN }}" `
            -GitHubActor "${{ github.actor }}"

  notify-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - sync-wiki-self-hosted
      - sync-wiki-hosted-fallback
    env:
      OVERALL_STATUS: ${{ contains(join(needs.*.result, ','), 'failure') && 'failure' || contains(join(needs.*.result, ','), 'cancelled') && 'cancelled' || 'success' }}
      DISCORD_WEBHOOK: ${{ vars['DISCORD_WEBHOOK'] }}
      TELEGRAM_WEBHOOK: ${{ vars['TELEGRAM_WEBHOOK'] }}
    steps:
      - name: Telegram notification (optional)
        if: env.TELEGRAM_WEBHOOK != ''
        continue-on-error: true
        shell: bash
        run: |
          MSG="[${{ github.repository }}] ${{ github.workflow }} -> ${OVERALL_STATUS} (run #${{ github.run_number }})\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$TELEGRAM_WEBHOOK" -H "Content-Type: application/json" -d "{\"text\":\"${MSG//$'\n'/\\n}\"}" >/dev/null

      - name: Discord notification (fallback + default)
        if: env.DISCORD_WEBHOOK != ''
        shell: bash
        run: |
          CONTENT="**${{ github.workflow }}**: ${OVERALL_STATUS}\nRepo: \\`${{ github.repository }}\\`\nBranch: \\`${{ github.ref_name }}\\`\nActor: \\`${{ github.actor }}\\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "{\"content\":\"${CONTENT//$'\n'/\\n}\"}" >/dev/null
