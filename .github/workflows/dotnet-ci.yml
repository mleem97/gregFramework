name: .NET CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      useHostedRunner:
        description: "Use hosted runner for build job (manual fallback)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  changelog-keep-a-changelog-check-self-hosted:
    runs-on:
      - self-hosted
      - windows
      - x64
      - Marvins-Ding
    timeout-minutes: 15
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.useHostedRunner != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CHANGELOG format (Keep a Changelog)
        shell: pwsh
        run: |
          $changelogPath = 'CHANGELOG.md'
          if (-not (Test-Path -LiteralPath $changelogPath)) {
            throw 'CHANGELOG.md is missing.'
          }

          $content = Get-Content -LiteralPath $changelogPath -Raw -ErrorAction Stop

          if ($content -notmatch '(?m)^# Changelog\s*$') {
            throw 'Missing "# Changelog" header.'
          }

          if ($content -notmatch 'Keep a Changelog') {
            throw 'Missing Keep a Changelog reference line.'
          }

          if ($content -notmatch '(?m)^## \[Unreleased\]\s*$') {
            throw 'Missing "## [Unreleased]" section.'
          }

          if ($content -notmatch '(?m)^## \[[^\]]+\] - \d{4}-\d{2}-\d{2}\s*$') {
            throw 'No release entries matching "## [version] - YYYY-MM-DD" were found.'
          }

          Write-Host 'Keep a Changelog validation passed.'

  changelog-keep-a-changelog-check-hosted-fallback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.useHostedRunner == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CHANGELOG format (Keep a Changelog)
        shell: pwsh
        run: |
          $changelogPath = 'CHANGELOG.md'
          if (-not (Test-Path -LiteralPath $changelogPath)) {
            throw 'CHANGELOG.md is missing.'
          }

          $content = Get-Content -LiteralPath $changelogPath -Raw -ErrorAction Stop

          if ($content -notmatch '(?m)^# Changelog\s*$') {
            throw 'Missing "# Changelog" header.'
          }

          if ($content -notmatch 'Keep a Changelog') {
            throw 'Missing Keep a Changelog reference line.'
          }

          if ($content -notmatch '(?m)^## \[Unreleased\]\s*$') {
            throw 'Missing "## [Unreleased]" section.'
          }

          if ($content -notmatch '(?m)^## \[[^\]]+\] - \d{4}-\d{2}-\d{2}\s*$') {
            throw 'No release entries matching "## [version] - YYYY-MM-DD" were found.'
          }

          Write-Host 'Keep a Changelog validation passed.'

  build-self-hosted:
    runs-on:
      - self-hosted
      - windows
      - x64
      - Marvins-Ding
    timeout-minutes: 30
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.useHostedRunner != 'true'

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore FrikaMF.csproj

      - name: Build (${{ matrix.configuration }})
        run: dotnet build FrikaMF.csproj --configuration ${{ matrix.configuration }} --no-restore

  build-hosted-fallback:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.useHostedRunner == 'true'

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore FrikaMF.csproj

      - name: Build (${{ matrix.configuration }})
        run: dotnet build FrikaMF.csproj --configuration ${{ matrix.configuration }} --no-restore

  notify-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - changelog-keep-a-changelog-check-self-hosted
      - changelog-keep-a-changelog-check-hosted-fallback
      - build-self-hosted
      - build-hosted-fallback
    env:
      OVERALL_STATUS: ${{ contains(join(needs.*.result, ','), 'failure') && 'failure' || contains(join(needs.*.result, ','), 'cancelled') && 'cancelled' || 'success' }}
      DISCORD_WEBHOOK: ${{ vars.DISCORD_WEBHOOK }}
      TELEGRAM_WEBHOOK: ${{ vars.TELEGRAM_WEBHOOK }}
    steps:
      - name: Telegram notification (optional)
        if: env.TELEGRAM_WEBHOOK != ''
        continue-on-error: true
        shell: bash
        run: |
          MSG="[${{ github.repository }}] ${{ github.workflow }} -> ${OVERALL_STATUS} (run #${{ github.run_number }})\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$TELEGRAM_WEBHOOK" -H "Content-Type: application/json" -d "{\"text\":\"${MSG//$'\n'/\\n}\"}" >/dev/null

      - name: Discord notification (fallback + default)
        if: env.DISCORD_WEBHOOK != ''
        shell: bash
        run: |
          CONTENT="**${{ github.workflow }}**: ${OVERALL_STATUS}\nRepo: \\`${{ github.repository }}\\`\nBranch: \\`${{ github.ref_name }}\\`\nActor: \\`${{ github.actor }}\\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "{\"content\":\"${CONTENT//$'\n'/\\n}\"}" >/dev/null
