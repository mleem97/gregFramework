name: Commit Lint

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      useHostedRunner:
        description: "Use hosted runner (manual fallback)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint-commits-self-hosted:
    runs-on:
      - self-hosted
      - windows
      - x64
      - Marvins-Ding
    timeout-minutes: 15
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.useHostedRunner != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint commit messages (push)
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $before = '${{ github.event.before }}'
          $after = '${{ github.sha }}'

          if ($before -eq '0000000000000000000000000000000000000000') {
            Write-Host 'New branch push detected; linting latest commit only.'
            npx commitlint --config .commitlintrc.json --from "$after~1" --to "$after"
          }
          else {
            npx commitlint --config .commitlintrc.json --from "$before" --to "$after"
          }

      - name: Lint commit messages (pull_request)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $baseSha = '${{ github.event.pull_request.base.sha }}'
          $headSha = '${{ github.event.pull_request.head.sha }}'

          git merge-base --is-ancestor "$baseSha" "$headSha"
          $ancestorExit = $LASTEXITCODE

          git merge-base "$baseSha" "$headSha" | Out-Null
          $mergeBaseExit = $LASTEXITCODE

          if ($ancestorExit -ne 0 -and $mergeBaseExit -ne 0) {
            Write-Host 'No common ancestor between PR base and head (history was likely rewritten).'
            Write-Host 'Please rebase/recreate the PR on the current master branch.'
            exit 1
          }

          npx commitlint --config .commitlintrc.json --from "$baseSha" --to "$headSha"

  lint-commits-hosted-fallback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.useHostedRunner == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint latest commit
        shell: bash
        run: |
          AFTER="${{ github.sha }}"
          npx commitlint --config .commitlintrc.json --from "$AFTER~1" --to "$AFTER"

  notify-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - lint-commits-self-hosted
      - lint-commits-hosted-fallback
    env:
      OVERALL_STATUS: ${{ contains(join(needs.*.result, ','), 'failure') && 'failure' || contains(join(needs.*.result, ','), 'cancelled') && 'cancelled' || 'success' }}
      DISCORD_WEBHOOK: ${{ vars['DISCORD_WEBHOOK'] }}
      TELEGRAM_WEBHOOK: ${{ vars['TELEGRAM_WEBHOOK'] }}
    steps:
      - name: Telegram notification (optional)
        if: env.TELEGRAM_WEBHOOK != ''
        continue-on-error: true
        shell: bash
        run: |
          MSG="[${{ github.repository }}] ${{ github.workflow }} -> ${OVERALL_STATUS} (run #${{ github.run_number }})\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$TELEGRAM_WEBHOOK" -H "Content-Type: application/json" -d "{\"text\":\"${MSG//$'\n'/\\n}\"}" >/dev/null

      - name: Discord notification (fallback + default)
        if: env.DISCORD_WEBHOOK != ''
        shell: bash
        run: |
          CONTENT="**${{ github.workflow }}**: ${OVERALL_STATUS}\nRepo: \\`${{ github.repository }}\\`\nBranch: \\`${{ github.ref_name }}\\`\nActor: \\`${{ github.actor }}\\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "{\"content\":\"${CONTENT//$'\n'/\\n}\"}" >/dev/null
