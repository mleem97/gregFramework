name: Release DLL Upload

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v00.01.0008)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on:
      - self-hosted
      - windows
      - x64
      - fmf-windows-runner
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Could not resolve release tag."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using release tag: $tag"

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore .\framework\FrikaMF.csproj
          dotnet restore .\mods\FMF.Mod.HexLabelMod\FMF.HexLabelMod.csproj
          dotnet restore .\mods\FMF.Plugin.LangCompatBridge\FMF.JoniMLCompatMod.csproj
          dotnet restore .\mods\FMF.Mod.GregifyEmployees\FMF.GregifyEmployees.csproj
          dotnet restore .\mods\FMF.ModPathRedirector\FMF.ModPathRedirector.csproj

      - name: Build release DLLs
        shell: pwsh
        run: |
          dotnet build .\framework\FrikaMF.csproj -c Release --no-restore
          dotnet build .\mods\FMF.Mod.HexLabelMod\FMF.HexLabelMod.csproj -c Release --no-restore
          dotnet build .\mods\FMF.Plugin.LangCompatBridge\FMF.JoniMLCompatMod.csproj -c Release --no-restore
          dotnet build .\mods\FMF.Mod.GregifyEmployees\FMF.GregifyEmployees.csproj -c Release --no-restore
          dotnet build .\mods\FMF.ModPathRedirector\FMF.ModPathRedirector.csproj -c Release --no-restore

      - name: Collect assets
        id: assets
        shell: pwsh
        run: |
          $outDir = Join-Path $PWD ".release-assets"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          $files = @(
            ".\framework\bin\Release\net6.0\FrikaModdingFramework.dll",
            ".\mods\FMF.Mod.HexLabelMod\bin\Release\net6.0\FMF.HexLabelMod.dll",
            ".\mods\FMF.Plugin.LangCompatBridge\bin\Release\net6.0\FMF.JoniMLCompatMod.dll",
            ".\mods\FMF.Mod.GregifyEmployees\bin\Release\net6.0\FMF.GregifyEmployees.dll",
            ".\mods\FMF.ModPathRedirector\bin\Release\net6.0\FMF.ModPathRedirector.dll"
          )

          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Missing expected build output: $file"
            }

            Copy-Item -Path $file -Destination $outDir -Force
          }

          "assetDir=$outDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Collected assets in $outDir"

      - name: Build modding bundle zip
        id: bundle
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $PWD ".release-bundle"
          $bundleName = "FrikaModFramework-ModdingBundle-${{ steps.tag.outputs.tag }}.zip"
          $bundleZip = Join-Path $PWD $bundleName

          if (Test-Path $bundleRoot) { Remove-Item -Recurse -Force $bundleRoot }
          if (Test-Path $bundleZip) { Remove-Item -Force $bundleZip }

          New-Item -ItemType Directory -Path $bundleRoot -Force | Out-Null

          $pathsToInclude = @(
            ".\\Templates",
            ".\\.wiki",
            ".\\scripts\\New-StreamingAssetModPack.ps1",
            ".\\scripts\\Invoke-DataCenterModDeploy.ps1"
          )

          foreach ($path in $pathsToInclude) {
            if (-not (Test-Path $path)) {
              throw "Missing required bundle input: $path"
            }
          }

          Copy-Item ".\\Templates" -Destination (Join-Path $bundleRoot "Templates") -Recurse -Force
          Copy-Item ".\\.wiki" -Destination (Join-Path $bundleRoot ".wiki") -Recurse -Force
          New-Item -ItemType Directory -Path (Join-Path $bundleRoot "scripts") -Force | Out-Null
          Copy-Item ".\\scripts\\New-StreamingAssetModPack.ps1" -Destination (Join-Path $bundleRoot "scripts\\New-StreamingAssetModPack.ps1") -Force
          Copy-Item ".\\scripts\\Invoke-DataCenterModDeploy.ps1" -Destination (Join-Path $bundleRoot "scripts\\Invoke-DataCenterModDeploy.ps1") -Force

          $manifestPath = Join-Path $bundleRoot "bundle-manifest.txt"
          Get-ChildItem -Path $bundleRoot -Recurse -File |
            Sort-Object FullName |
            ForEach-Object { $_.FullName.Replace($bundleRoot + "\\", "") } |
            Set-Content -Path $manifestPath -Encoding utf8

          Compress-Archive -Path (Join-Path $bundleRoot "*") -DestinationPath $bundleZip -CompressionLevel Optimal

          "bundleZip=$bundleZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Created modding bundle: $bundleZip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dlls-${{ steps.tag.outputs.tag }}
          path: ${{ steps.assets.outputs.assetDir }}\*.dll

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ steps.tag.outputs.tag }}
          path: ${{ steps.bundle.outputs.bundleZip }}

      - name: Upload DLLs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ steps.assets.outputs.assetDir }}\FrikaModdingFramework.dll
            ${{ steps.assets.outputs.assetDir }}\FMF.HexLabelMod.dll
            ${{ steps.assets.outputs.assetDir }}\FMF.JoniMLCompatMod.dll
            ${{ steps.assets.outputs.assetDir }}\FMF.GregifyEmployees.dll
            ${{ steps.assets.outputs.assetDir }}\FMF.ModPathRedirector.dll
            ${{ steps.bundle.outputs.bundleZip }}
          generate_release_notes: true
