name: Release DLL Upload

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v00.01.0008)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on:
      - self-hosted
      - windows
      - x64
      - Marvins-Ding
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Could not resolve release tag."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using release tag: $tag"

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore .\FrikaMF.csproj
          dotnet restore .\StandaloneMods\FMF.UIReplacementMod\FMF.UIReplacementMod.csproj
          dotnet restore .\StandaloneMods\FMF.HexLabelMod\FMF.HexLabelMod.csproj
          dotnet restore .\StandaloneMods\FMF.JoniMLCompatMod\FMF.JoniMLCompatMod.csproj

      - name: Build release DLLs
        shell: pwsh
        run: |
          dotnet build .\FrikaMF.csproj -c Release --no-restore
          dotnet build .\StandaloneMods\FMF.UIReplacementMod\FMF.UIReplacementMod.csproj -c Release --no-restore
          dotnet build .\StandaloneMods\FMF.HexLabelMod\FMF.HexLabelMod.csproj -c Release --no-restore
          dotnet build .\StandaloneMods\FMF.JoniMLCompatMod\FMF.JoniMLCompatMod.csproj -c Release --no-restore

      - name: Collect assets
        id: assets
        shell: pwsh
        run: |
          $outDir = Join-Path $PWD ".release-assets"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          $files = @(
            ".\bin\Release\net6.0\FrikaModdingFramework.dll",
            ".\StandaloneMods\FMF.UIReplacementMod\bin\Release\net6.0\FMF.UIReplacementMod.dll",
            ".\StandaloneMods\FMF.HexLabelMod\bin\Release\net6.0\FMF.HexLabelMod.dll",
            ".\StandaloneMods\FMF.JoniMLCompatMod\bin\Release\net6.0\FMF.JoniMLCompatMod.dll"
          )

          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Missing expected build output: $file"
            }

            Copy-Item -Path $file -Destination $outDir -Force
          }

          "assetDir=$outDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Collected assets in $outDir"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dlls-${{ steps.tag.outputs.tag }}
          path: ${{ steps.assets.outputs.assetDir }}\*.dll

      - name: Upload DLLs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ steps.assets.outputs.assetDir }}\FrikaModdingFramework.dll
            ${{ steps.assets.outputs.assetDir }}\FMF.UIReplacementMod.dll
            ${{ steps.assets.outputs.assetDir }}\FMF.HexLabelMod.dll
            ${{ steps.assets.outputs.assetDir }}\FMF.JoniMLCompatMod.dll
          generate_release_notes: true
